name = "toto-proxy"
main = "cloudworker.js"
compatibility_date = "2024-01-01"
account_id = "08735b0b6c1df0b90041c2e1356f757d"

# Scheduled triggers (NL zomertijd = UTC+2)
# 08:00 NL = 06:00 UTC — ochtendscan + settlement + dagelijkse tip
# 14:00-24:00 NL = 12:00-22:00 UTC — elk uur voor optimale steam detectie
[triggers]
crons = ["0 6 * * *", "0 12-22 * * *"]

# Secrets (stel in via: wrangler secret put NAAM)
# ANTHROPIC_KEY    — Anthropic API key
# API_FOOTBALL     — RapidAPI key voor API-Football
# FB_API_KEY       — Firebase Realtime DB secret
# ONESIGNAL_APP_ID — OneSignal App ID
# ONESIGNAL_API_KEY — OneSignal REST API key
# SCAN_SECRET      — Willekeurig wachtwoord voor handmatige /scan trigger
# FD_KEY           — Football-data.org key (optioneel)
