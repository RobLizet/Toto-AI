name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - 'cloudworker.js'
      - 'wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: ✅ Syntax check cloudworker.js
        run: |
          node --check cloudworker.js && echo "✅ Syntax OK — doorgaan met deploy" || (echo "❌ Syntax fout in cloudworker.js — deploy afgebroken" && exit 1)

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.92.0'
