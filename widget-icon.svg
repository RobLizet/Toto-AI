<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="50%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Afgeronde achtergrond -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Witte kaart met schaduw -->
  <rect x="40" y="40" width="432" height="432" rx="72" fill="white" fill-opacity="0.95" filter="url(#sh)"/>

  <!-- Bliksem bolt (TIP symbool) - groot centraal -->
  <path d="M 290 80 L 210 270 L 260 270 L 222 432 L 320 240 L 268 240 L 310 80 Z"
        fill="url(#pink)" opacity="0.95"/>

  <!-- Ster rechtsboven -->
  <path d="M 390 90 L 398 114 L 424 114 L 403 130 L 411 154 L 390 138 L 369 154 L 377 130 L 356 114 L 382 114 Z"
        fill="url(#purple)" opacity="0.85"/>

  <!-- TOTO AI label onderaan -->
  <rect x="80" y="400" width="352" height="72" rx="20"
        fill="url(#pink)" opacity="0.12"/>
  <text x="256" y="448" font-family="Arial Black, Arial, sans-serif"
        font-size="36" font-weight="900" text-anchor="middle"
        fill="url(#pink)" letter-spacing="6">TOTO AI</text>

  <!-- Kleine bal linksboven decoratie -->
  <circle cx="108" cy="104" r="28" fill="none" stroke="url(#purple)" stroke-width="5" opacity="0.5"/>
  <circle cx="108" cy="104" r="8" fill="url(#purple)" opacity="0.4"/>
</svg>
