<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ProMatchXI — Beheer</title>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 16px; background: #0f1115; color: #e6e8eb;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: #9aa0a6; font-size: 13px; margin: 0 0 16px; }
    .card {
      background: #1a1d23; border: 1px solid #262a31; border-radius: 12px;
      padding: 14px; margin-bottom: 14px;
    }
    .stat { font-size: 28px; font-weight: 700; }
    .stat-label { color: #9aa0a6; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid #262a31; }
    th { color: #9aa0a6; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    td.email { font-weight: 500; word-break: break-all; }
    .muted { color: #7c828a; font-size: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .ok { background: #113a2a; color: #34d399; }
    .warn { background: #3a2f11; color: #fbbf24; }
    .err { background: #3a1414; color: #f87171; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333;
      background: #12141a; color: #e6e8eb; font-size: 15px;
    }
    button {
      margin-top: 10px; padding: 10px 16px; border: none; border-radius: 8px;
      background: #2563eb; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    #tagStatus { margin-top: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>ProMatchXI — Beheer</h1>
  <p class="sub">Geregistreerde gebruikers · admin-only</p>

  <div id="gate" class="card" style="display:none">
    <div class="stat-label" style="margin-bottom:8px">Secret vereist</div>
    <input id="secretInput" type="password" placeholder="Voer secret in" />
    <button id="secretBtn">Ontgrendelen</button>
  </div>

  <div id="content" style="display:none">
    <div class="card">
      <div class="stat-label">Totaal gebruikers</div>
      <div class="stat" id="userCount">–</div>
      <div id="tagStatus" class="muted">Admin-melding instellen…</div>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr><th>E-mail</th><th>Aangemeld</th><th>Laatst actief</th></tr>
        </thead>
        <tbody id="userRows"></tbody>
      </table>
    </div>
  </div>

  <div id="msg" class="muted"></div>

  <script>
    var params = new URLSearchParams(location.search);
    var secret = params.get('secret') || sessionStorage.getItem('pmx_admin_secret') || '';

    function fmt(ts) {
      if (!ts) return '<span class="muted">–</span>';
      try {
        var d = new Date(ts);
        return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch (e) { return ts; }
    }

    function setTag() {
      // Tag dit toestel als admin, zodat admin-pushes (nieuwe registraties) hier aankomen.
      var el = document.getElementById('tagStatus');
      try {
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        window.OneSignalDeferred.push(async function (OneSignal) {
          try {
            await OneSignal.init({
              appId: '7efd1d2e-630e-48b3-bc32-2704e1a5dc2f',
              serviceWorkerPath: '/OneSignalSDKWorker.js',
              notifyButton: { enable: false },
            });
          } catch (e) { /* al geïnit door hoofd-app, negeren */ }
          try {
            await OneSignal.User.addTag('role', 'admin');
            el.innerHTML = '<span class="badge ok">admin-melding actief op dit toestel</span>';
          } catch (e) {
            el.innerHTML = '<span class="badge warn">tag mislukt: ' + (e && e.message ? e.message : 'onbekend') + '</span>';
          }
        });
      } catch (e) {
        el.innerHTML = '<span class="badge warn">OneSignal niet geladen</span>';
      }
    }

    async function loadUsers() {
      var msg = document.getElementById('msg');
      try {
        var res = await fetch('https://api.promatchxi.app/app-users?secret=' + encodeURIComponent(secret));
        if (res.status === 401) {
          showGate('Onjuiste secret.');
          return;
        }
        var data = await res.json();
        sessionStorage.setItem('pmx_admin_secret', secret);
        document.getElementById('gate').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('userCount').textContent = data.count || 0;
        var rows = (data.users || []).map(function (u) {
          return '<tr><td class="email">' + (u.email || '<span class="muted">geen</span>') +
                 '</td><td>' + fmt(u.created_at) +
                 '</td><td>' + fmt(u.last_seen) + '</td></tr>';
        }).join('');
        document.getElementById('userRows').innerHTML = rows || '<tr><td colspan="3" class="muted">Nog geen gebruikers.</td></tr>';
        msg.textContent = '';
        setTag();
      } catch (e) {
        msg.innerHTML = '<span class="badge err">Fout bij laden: ' + (e && e.message ? e.message : e) + '</span>';
      }
    }

    function showGate(note) {
      document.getElementById('gate').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      if (note) document.getElementById('msg').innerHTML = '<span class="badge err">' + note + '</span>';
    }

    document.getElementById('secretBtn').addEventListener('click', function () {
      secret = document.getElementById('secretInput').value.trim();
      if (secret) { document.getElementById('msg').textContent = ''; loadUsers(); }
    });

    if (secret) { loadUsers(); } else { showGate(''); }
  </script>
</body>
</html>
