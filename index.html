<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TOTO AI" />
  <title>TOTO AI</title>

  <!-- Manifest & Icons -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
  <link rel="stylesheet" href="screens.css" />

  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════
     APP WRAPPER
═══════════════════════════════════════════ -->
<div id="app" class="app">

  <!-- ── Topbar ── -->
  <div id="topbar" class="topbar" style="display:none">
    <!-- Links: logo + versie -->
    <div class="topbar-left" style="display:flex;align-items:center;gap:.4rem;">
      <span class="topbar-logo" style="font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.06em;color:#1a1f3c;line-height:1;">TOTO <span class="topbar-ai" style="color:#b8922a;">AI</span></span>
      <span id="topbar-version" class="topbar-version" style="font-family:'IBM Plex Mono',monospace;font-size:.4rem;color:#b8922a;background:rgba(184,146,42,.12);border:1px solid rgba(184,146,42,.3);border-radius:99px;padding:.1rem .4rem;"></span>
    </div>
    <!-- Rechts: user chip + iconen -->
    <div class="topbar-right" style="display:flex;align-items:center;gap:.4rem;">
      <span id="topbar-user" class="topbar-user" style="display:none;font-family:'IBM Plex Mono',monospace;font-size:.44rem;color:#6b7a99;background:#eaeff8;border:1px solid rgba(15,23,42,.13);border-radius:99px;padding:.18rem .55rem;max-width:90px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"></span>
      <button id="topbar-login-btn" class="topbar-icon-btn" onclick="handleLoginBtnClick()" title="Account" style="display:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span id="login-status-dot" style="position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:#dc2626;border:1.5px solid white;display:block"></span>
      </button>
      <button id="topbar-notif-btn" class="topbar-icon-btn" onclick="toggleNotifications();this.classList.add('bell-ring');setTimeout(()=>this.classList.remove('bell-ring'),600)" title="Notificaties">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span id="notif-dot" class="notif-dot" style="display:none"></span>
      </button>
      <button class="topbar-icon-btn" onclick="toggleMoreMenu()" title="Meer opties">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── More Menu backdrop ── -->
  <div id="more-menu-backdrop" class="more-menu-backdrop" onclick="closeMoreMenu()"></div>

  <!-- ── More Menu ── -->
  <div id="more-menu" class="more-menu">
    <div class="more-menu-panel">
      <button class="more-menu-item" onclick="switchScreen('instellingen');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Instellingen
      </button>
      <button class="more-menu-item" onclick="switchScreen('analytics');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        📊 Stats & Analytics
      </button>
      <button class="more-menu-item" onclick="switchScreen('wk2026');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="6"/>
          <path d="M12 14v7M8 21h8"/>
        </svg>
        🏆 WK 2026 Voorspelling
      </button>
      <button class="more-menu-item" onclick="saveToFirebase();closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        Opslaan naar Firebase
      </button>
      <button class="more-menu-item" onclick="window.open('help.html','_blank');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Help & Uitleg
      </button>
      <button class="more-menu-item" onclick="logoutUser();closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Uitloggen
      </button>
    </div>
  </div>

  <!-- ── Firebase Status Banner ── -->
  <div id="firebase-status" class="firebase-status" style="display:none"></div>

  <!-- ── Auto Check Bar ── -->
  <div id="auto-check-bar" class="auto-check-bar" style="display:none">
    <span id="auto-check-msg" class="auto-check-msg"></span>
    <button onclick="document.getElementById('auto-check-bar').style.display='none'" class="auto-check-close">✕</button>
  </div>

  <!-- ── Install Banner ── -->
  <div id="install-banner" class="install-banner" style="display:none">
    <span>Installeer TOTO AI als app</span>
    <button id="install-btn" class="install-btn">Installeren</button>
    <button onclick="document.getElementById('install-banner').style.display='none'" class="install-close">✕</button>
  </div>

  <!-- ══════════════════════════════════════════
       SCREENS
  ══════════════════════════════════════════ -->

  <!-- Login Screen -->
  <div id="screen-login" class="screen screen-login">
    <div class="login-container">
      <div class="login-logo">
        <span class="login-logo-toto">TOTO</span>
        <span class="login-logo-ai">AI</span>
      </div>
      <p class="login-tagline">Slimme voetbalanalyse</p>

      <div class="login-tabs">
        <button id="login-tab-in" class="login-tab active" onclick="switchLoginTab('in')">Inloggen</button>
        <button id="login-tab-reg" class="login-tab" onclick="switchLoginTab('reg')">Registreren</button>
      </div>

      <div id="login-form-in" class="login-form">
        <input id="login-email" type="email" class="login-input" placeholder="E-mailadres" autocomplete="email" />
        <input id="login-password" type="password" class="login-input" placeholder="Wachtwoord" autocomplete="current-password" />
        <button class="login-submit-btn" onclick="loginWithEmail()">Inloggen</button>
        <button class="login-google-btn" onclick="loginWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Doorgaan met Google
        </button>
      </div>

      <div id="login-form-reg" class="login-form" style="display:none">
        <input id="reg-email" type="email" class="login-input" placeholder="E-mailadres" autocomplete="email" />
        <input id="reg-password" type="password" class="login-input" placeholder="Wachtwoord (min. 6 tekens)" autocomplete="new-password" />
        <input id="reg-password2" type="password" class="login-input" placeholder="Herhaal wachtwoord" autocomplete="new-password" />
        <button class="login-submit-btn" onclick="registerWithEmail()">Account aanmaken</button>
      </div>

      <button class="login-skip-btn" onclick="skipLoginAndEnter()">Verder zonder account</button>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="screen-dashboard" class="screen screen-dashboard">
    <!-- Gevuld door renderDashboard() -->
  </div>

  <!-- Wedstrijden Screen -->
  <div id="screen-wedstrijden" class="screen screen-wedstrijden">
    <!-- Gevuld door renderWedstrijdenScreen() -->
  </div>

  <!-- Analyse Screen -->
  <div id="screen-analyse" class="screen screen-analyse">
    <!-- Gevuld door renderAnalyseScreen() -->
  </div>

  <!-- Wallet Screen -->
  <div id="screen-wallet" class="screen screen-wallet">
    <!-- Gevuld door renderWalletScreen() -->
  </div>

  <!-- Instellingen Screen -->
  <div id="screen-instellingen" class="screen screen-instellingen">
    <!-- Gevuld door renderInstellingen() -->
  </div>

  <!-- Analytics Screen -->
  <div id="screen-analytics" class="screen screen-analytics">
    <!-- Gevuld door renderAnalyticsScreen() -->
  </div>

  <!-- WK 2026 Screen -->
  <div id="screen-wk2026" class="screen screen-wk2026">
    <!-- Gevuld door renderWK2026Screen() -->
  </div>

  <!-- ══════════════════════════════════════════
       BOTTOM NAVIGATION
  ══════════════════════════════════════════ -->
  <nav id="bottom-nav" class="bottom-nav" style="display:none">
    <button class="bnav-btn" data-screen="dashboard" onclick="switchScreen('dashboard')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Home</span>
      <span class="bnav-dot" id="dot-dashboard"></span>
    </button>
    <button class="bnav-btn" data-screen="wedstrijden" onclick="switchScreen('wedstrijden')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
      <span>Matches</span>
      <span class="bnav-dot" id="dot-wedstrijden"></span>
    </button>
    <button class="bnav-btn" data-screen="analyse" onclick="switchScreen('analyse')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Analyse</span>
      <span class="bnav-dot" id="dot-analyse"></span>
    </button>
    <button class="bnav-btn" data-screen="wallet" onclick="switchScreen('wallet')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      <span>Wallet</span>
      <span class="bnav-dot" id="dot-wallet"></span>
    </button>

  </nav>

  <!-- ══════════════════════════════════════════
       MODALS
  ══════════════════════════════════════════ -->

  <!-- Bet Modal -->
  <div id="bet-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeBetModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="bet-modal-title" class="modal-title">Weddenschap toevoegen</h3>
        <button class="modal-close-btn" onclick="closeBetModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="kelly-advies" style="display:none;"></div>
        <div class="modal-field">
          <label class="modal-label">Wedstrijd</label>
          <input id="bet-match" type="text" class="modal-input" placeholder="bijv. Ajax - PSV" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Inzet (€)</label>
          <input id="bet-stake" type="number" class="modal-input" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Odds</label>
          <input id="bet-odds" type="number" class="modal-input" placeholder="1.00" min="1" step="0.01" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Type</label>
          <select id="bet-type" class="modal-input modal-select">
            <option value="1X2">1X2</option>
            <option value="O/U">Over/Under</option>
            <option value="BTTS">Beide scoren</option>
            <option value="Handicap">Handicap</option>
            <option value="Overig">Overig</option>
          </select>
        </div>
        <div class="modal-field">
          <label class="modal-label">Notitie (optioneel)</label>
          <input id="bet-note" type="text" class="modal-input" placeholder="bijv. Thuis sterk, Beide scoren" />
        </div>
        <div class="modal-actions">
          <button class="modal-cancel-btn" onclick="closeBetModal()">Annuleren</button>
          <button class="modal-confirm-btn" onclick="confirmBet()">Toevoegen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Bet Modal (voor match cards) -->
  <div id="quick-bet-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeQuickBetModal()">
    <div class="modal-box modal-box-sm">
      <div class="modal-header">
        <h3 id="quick-bet-title" class="modal-title">Snel inzetten</h3>
        <button class="modal-close-btn" onclick="closeQuickBetModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="quick-bet-info" class="quick-bet-info"></div>
        <div class="modal-field">
          <label class="modal-label">Inzet (€)</label>
          <div class="quick-stake-row">
            <button class="quick-stake-preset" onclick="setQuickStake(5)">€5</button>
            <button class="quick-stake-preset" onclick="setQuickStake(10)">€10</button>
            <button class="quick-stake-preset" onclick="setQuickStake(25)">€25</button>
            <button class="quick-stake-preset" onclick="setQuickStake(50)">€50</button>
          </div>
          <input id="quick-bet-stake" type="number" class="modal-input" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div id="quick-bet-return" class="quick-bet-return"></div>
        <div class="modal-actions">
          <button class="modal-cancel-btn" onclick="closeQuickBetModal()">Annuleren</button>
          <button class="modal-confirm-btn" onclick="confirmQuickBet()">Inzetten</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tracker Modal -->
  <div id="tracker-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeTrackerModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">Tracker toevoegen</h3>
        <button class="modal-close-btn" onclick="closeTrackerModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label class="modal-label">Naam / label</label>
          <input id="tracker-name" type="text" class="modal-input" placeholder="bijv. Weekend combi" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Inzet (€)</label>
          <input id="tracker-stake" type="number" class="modal-input" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Type</label>
          <select id="tracker-type-select" class="modal-input modal-select" onchange="setTrackerType(this.value)">
            <option value="single">Enkelvoudig</option>
            <option value="combi">Combinatie</option>
          </select>
        </div>
        <div id="tracker-single-fields">
          <div class="modal-field">
            <label class="modal-label">Odds</label>
            <input id="tracker-odds" type="number" class="modal-input" placeholder="1.00" min="1" step="0.01" />
          </div>
        </div>
        <div id="tracker-combi-fields" style="display:none">
          <div class="tracker-legs-header">
            <span class="modal-label">Legs</span>
            <button class="add-leg-btn" onclick="addTrackerLeg()">+ Leg toevoegen</button>
          </div>
          <div id="tracker-legs-container"></div>
          <div class="modal-field">
            <label class="modal-label">Totale odds (berekend)</label>
            <input id="tracker-total-odds" type="text" class="modal-input" readonly placeholder="–" />
          </div>
        </div>
        <div class="modal-actions">
          <button class="modal-cancel-btn" onclick="closeTrackerModal()">Annuleren</button>
          <button class="modal-confirm-btn" onclick="confirmTracker()">Opslaan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Deposit Modal -->
  <div id="deposit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeDepositModal()">
    <div class="modal-box modal-box-sm">
      <div class="modal-header">
        <h3 class="modal-title">Storten</h3>
        <button class="modal-close-btn" onclick="closeDepositModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label class="modal-label">Bedrag (€)</label>
          <input id="deposit-amount" type="number" class="modal-input" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Notitie (optioneel)</label>
          <input id="deposit-note" type="text" class="modal-input" placeholder="bijv. Startkapitaal" />
        </div>
        <div class="modal-actions">
          <button class="modal-cancel-btn" onclick="closeDepositModal()">Annuleren</button>
          <button class="modal-confirm-btn" onclick="confirmDeposit()">Storten</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Withdraw Modal -->
  <div id="withdraw-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeWithdrawModal()">
    <div class="modal-box modal-box-sm">
      <div class="modal-header">
        <h3 class="modal-title">Opnemen</h3>
        <button class="modal-close-btn" onclick="closeWithdrawModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label class="modal-label">Bedrag (€)</label>
          <input id="withdraw-amount" type="number" class="modal-input" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Notitie (optioneel)</label>
          <input id="withdraw-note" type="text" class="modal-input" placeholder="bijv. Winst opnemen" />
        </div>
        <div class="modal-actions">
          <button class="modal-cancel-btn" onclick="closeWithdrawModal()">Annuleren</button>
          <button class="modal-confirm-btn" onclick="confirmWithdraw()">Opnemen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Competitie Detail Modal -->
  <div id="comp-detail-modal" class="modal-overlay comp-detail-overlay" style="display:none" onclick="if(event.target===this)closeCompDetail()">
    <div class="modal-box comp-detail-modal">
      <div class="modal-header">
        <h3 id="comp-detail-title" class="modal-title">Competitie</h3>

<script>
(function initApp() {
  'use strict';

  // ── Laad opgeslagen state ──
  loadState();
  applyStoredTheme();

  // ── Versienummer in topbar ──
  const vEl = document.getElementById('topbar-version');
  if (vEl) vEl.textContent = APP_VERSION;

  // ── Service Worker registreren ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // ── PWA Install banner ──
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
    document.getElementById('install-btn').addEventListener('click', () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    });
  });

  // ── OneSignal init ──
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: '7efd1d2e-630e-48b3-bc32-2704e1a5dc2f',
      serviceWorkerPath: '/OneSignalSDKWorker.js',
      notifyButton: { enable: false },
    });
  });

  // ── Firebase Auth init (bepaalt welk scherm getoond wordt) ──
  initFirebaseAuth();

  // ── Bottom nav init ──
  initBottomNav();

  // ── Auto dark mode check ──
  if (typeof checkAutoDarkNow === 'function') checkAutoDarkNow();

  // ── Start Firebase auto-sync (elke 5 min) ──
  if (typeof scheduleFirebaseSync === 'function') scheduleFirebaseSync();

  // ── Keyboard shortcut: Escape sluit modals ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      ['bet-modal','quick-bet-modal','tracker-modal','deposit-modal',
       'withdraw-modal','comp-detail-modal','analyse-modal'].forEach(id => {
        const el = document.getElementById(id);
        if (el && el.style.display !== 'none') el.style.display = 'none';
      });
      closeMoreMenu();
    }
  });

})();
</script>

    style="position:fixed;bottom:7rem;right:1rem;z-index:9999;

  <div id="fab-chat-panel"
    style="display:none;position:fixed;bottom:11rem;right:1rem;z-index:9998;

      padding:.65rem .9rem .55rem;
      background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(219,39,119,.06));

      </div>
    </div>

      style="height:220px;overflow-y:auto;padding:.6rem .8rem;display:flex;flex-direction:column;gap:.4rem;">
      <div style="font-family:monospace;font-size:.48rem;color:#64748b;text-align:center;padding:.5rem;">
        Stel vragen over wedstrijden & picks 💬
      </div>
    </div>
    <div style="display:flex;gap:.4rem;padding:.5rem .7rem;border-top:1px solid rgba(15,23,42,.08);">
      <input id="fab-chat-input" type="text" placeholder="Stel een vraag..."
        style="flex:1;font-family:monospace;font-size:.54rem;
        border:1px solid rgba(15,23,42,.12);border-radius:10px;padding:.4rem .7rem;
        background:rgba(15,23,42,.03);outline:none;"
        onkeydown="if(event.key==='Enter')sendFloatingChat()">
      <button onclick="sendFloatingChat()"
        style="background:linear-gradient(135deg,#7c3aed,#be185d);border:none;
        border-radius:10px;padding:.4rem .75rem;color:#fff;
        font-family:monospace;font-size:.6rem;font-weight:700;cursor:pointer;">▶</button>

  <script>
  var _fabHistory = [];

  function toggleFloatingChat() {
    var panel = document.getElementById('fab-chat-panel');
    if (!panel) return;
    var isOpen = panel.style.display === 'flex';
    panel.style.display = isOpen ? 'none' : 'flex';
    if (!isOpen) {
      setTimeout(function() {
        var inp = document.getElementById('fab-chat-input');
        if (inp) inp.focus();
      }, 100);
    }
  }

  function clearFloatingChat() {
    _fabHistory = [];
    var msgs = document.getElementById('fab-chat-messages');
    if (msgs) msgs.innerHTML = '<div style="font-family:monospace;font-size:.48rem;color:#64748b;text-align:center;padding:.5rem;">Chat gewist. Stel gerust een nieuwe vraag! 👋</div>';
  }

  async function sendFloatingChat() {
    var inp = document.getElementById('fab-chat-input');
    var msgs = document.getElementById('fab-chat-messages');
    if (!inp || !msgs) return;
    var text = inp.value.trim();
    if (!text) return;
    inp.value = '';

    // Gebruiker bubble
    var userBubble = document.createElement('div');
    userBubble.style.cssText = 'align-self:flex-end;background:linear-gradient(135deg,#7c3aed,#be185d);color:#fff;padding:.4rem .7rem;border-radius:12px 12px 2px 12px;font-family:monospace;font-size:.5rem;max-width:85%;line-height:1.5;';
    userBubble.textContent = text;
    msgs.appendChild(userBubble);

    _fabHistory.push({ role: 'user', content: text });
    if (_fabHistory.length > 20) _fabHistory = _fabHistory.slice(-20);

    // Loading bubble
    var loadingBubble = document.createElement('div');
    loadingBubble.style.cssText = 'align-self:flex-start;background:rgba(15,23,42,.06);padding:.4rem .7rem;border-radius:12px 12px 12px 2px;font-family:monospace;font-size:.5rem;max-width:85%;line-height:1.5;color:#64748b;';
    loadingBubble.textContent = '⟳ Denkt na...';
    msgs.appendChild(loadingBubble);
    msgs.scrollTop = msgs.scrollHeight;

    try {
      var WORKER_URL = 'https://toto-proxy.zweetzakken.workers.dev';
      var authToken = '';
      try {
        var u = typeof firebase !== 'undefined' && firebase.auth().currentUser;
        if (u) authToken = await u.getIdToken();
      } catch(e) {}

      var systemParts = ['Je bent TOTO AI assistent. Help de gebruiker met voetbal betting analyse, picks en statistieken. Antwoord in het Nederlands, beknopt en to the point.'];
      if (typeof state !== 'undefined') {
        if (state.selectedMatch) systemParts.push('Geselecteerde wedstrijd: ' + (state.selectedMatch.home||'') + ' vs ' + (state.selectedMatch.away||''));
        if (state.valueScans && state.valueScans.length) systemParts.push('Laatste scan: ' + state.valueScans.length + ' picks');
      }

      var res = await fetch(WORKER_URL + '/anthropic', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(authToken ? {'Authorization': 'Bearer ' + authToken} : {})
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 400,
          system: systemParts.join('\n\n'),
          messages: _fabHistory
        })
      });
      var data = await res.json();
      var answer = data && data.content && data.content[0] ? data.content[0].text : '⚠ Geen antwoord ontvangen';
      loadingBubble.textContent = answer;
      loadingBubble.style.color = '#0f172a';
      _fabHistory.push({ role: 'assistant', content: answer });
    } catch(e) {
      loadingBubble.textContent = '⚠ Fout: ' + e.message;
      loadingBubble.style.color = '#dc2626';
    }
    msgs.scrollTop = msgs.scrollHeight;
  }
  </script>
