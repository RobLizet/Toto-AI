<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOTO AI v40</title>
    <style>
        :root { --primary: #00ff88; --bg: #0a0f14; --card: #161e26; --sub: #8a96a3; --danger: #ff3b30; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .tab-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2d3748; z-index: 1000; }
        .tab-btn { background: none; border: none; color: var(--sub); display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.ai-special { color: var(--danger) !important; font-weight: bold; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--danger); }
        .edge-badge { background: var(--danger); color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; float: right; }
    </style>
</head>
<body>

    <div id="tab-wedstrijden" class="tab-content active">
        <h2>⚽ Live Wedstrijden</h2>
        <div id="live-list">Laden van live data...</div>
    </div>

    <div id="tab-scans" class="tab-content">
        <h2 style="color: var(--danger);">⚡ AI Value Scans (v40)</h2>
        <div id="v40-scan-list">
            <div style="color: var(--sub);">Kijkend in de database naar AI kansen...</div>
        </div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('wedstrijden')">
            <span>⚽</span><span>LIVE</span>
        </button>
        <button class="tab-btn ai-special" onclick="switchTab('scans')">
            <span>⚡</span><span>AI SCAN</span>
        </button>
        <button class="tab-btn" onclick="switchTab('wallet')">
            <span>💶</span><span>WALLET</span>
        </button>
        <button class="tab-btn" onclick="switchTab('meer')">
            <span>•••</span><span>MEER</span>
        </button>
    </div>

    <script>
        // v40 FIREBASE CONNECTOR
        const FB_URL = 'https://toto-ai-397cb-default-rtdb.europe-west1.firebasedatabase.app/picks.json';

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            if(tabId === 'scans') loadV40Picks();
        }

        async function loadV40Picks() {
            const container = document.getElementById('v40-scan-list');
            try {
                const res = await fetch(FB_URL);
                const data = await res.json();
                if(!data) {
                    container.innerHTML = "Geen actuele AI picks gevonden.";
                    return;
                }
                
                container.innerHTML = "";
                Object.values(data).reverse().forEach(pick => {
                    container.innerHTML += `
                        <div class="match-card">
                            <span class="edge-badge">+${pick.audit.edge.toFixed(1)}% Edge</span>
                            <div style="font-size: 14px; font-weight: bold;">${pick.home} vs ${pick.away}</div>
                            <div style="color: var(--sub); font-size: 12px; margin-top: 5px;">
                                AI Kans: ${pick.kans}% | Bet: ${pick.betType}
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = "Fout bij laden Firebase: " + e.message;
            }
        }

        // Auto-load bij opstarten
        setInterval(loadV40Picks, 30000); 
    </script>
</body>
</html>
