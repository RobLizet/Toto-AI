<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TOTO AI — Voetbal Analyse</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffd7e6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TOTO AI">
<meta name="description" content="AI voetbal toto analyses, winstkansen en combi tips">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;800&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg1:#fef6f0;--bg2:#f3f0ff;--bg3:#eef6ff;
  --ink:#0f172a;--muted:#475569;--sub:#64748b;
  --card:rgba(255,255,255,0.80);--card2:rgba(255,255,255,0.65);
  --stroke:rgba(15,23,42,0.10);
  --shadow:0 18px 50px rgba(12,18,30,0.12);
  --shadow2:0 4px 16px rgba(12,18,30,0.08);
  --green:#16a34a;--red:#dc2626;--yellow:#d97706;--orange:#ea580c;
  --blue:#2563eb;--purple:#7c3aed;
  --pink:#db2777;--rose:#fce7f3;--lavender:#ede9fe;--sky:#e0f2fe;
  --accent:#db2777;
  --text:var(--ink);--border:var(--stroke);--gold:#d97706;
  --coffee:#db2777;--surface:rgba(255,255,255,0.95);
}

/* ── DARK MODE ── */
body.dark {
--bg1:#0d0f14;--bg2:#111318;--bg3:#0f1219;
--ink:#f1f5f9;--muted:#94a3b8;--sub:#64748b;
--card:rgba(30,35,48,0.90);--card2:rgba(25,30,42,0.80);
--stroke:rgba(255,255,255,0.08);
--shadow:0 18px 50px rgba(0,0,0,0.4);
--shadow2:0 4px 16px rgba(0,0,0,0.25);
--rose:#2d1520;--lavender:#1e1535;--sky:#0f1f2e;
--surface:rgba(20,24,36,0.98);
}
body.dark {
background:
radial-gradient(1200px 700px at 20% -10%,rgba(219,39,119,.08),transparent 55%),
radial-gradient(1000px 650px at 85% 5%,rgba(37,99,235,.07),transparent 60%),
radial-gradient(900px 700px at 40% 120%,rgba(124,58,237,.07),transparent 60%),
linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg3));
}

/* ── MINT THEMA (rustig groen, oogvriendelijk) ── */
body.mint {
--bg1:#f0fdf4;--bg2:#ecfdf5;--bg3:#f7fee7;
--ink:#064e3b;--muted:#475569;--sub:#64748b;
--card:rgba(255,255,255,0.85);--card2:rgba(255,255,255,0.70);
--stroke:rgba(5,78,59,0.10);
--accent:#059669;
--rose:#d1fae5;--lavender:#e0f2fe;--sky:#ccfbf1;
}
body.mint {
background:
radial-gradient(1200px 700px at 20% -10%,rgba(52,211,153,.18),transparent 55%),
radial-gradient(1000px 650px at 85% 5%,rgba(167,243,208,.22),transparent 60%),
radial-gradient(900px 700px at 40% 120%,rgba(134,239,172,.20),transparent 60%),
linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg3));
}
body.mint .tab-nav-wrap {
background:linear-gradient(180deg,rgba(240,253,244,.98) 80%,transparent);
}
body.mint .tab-btn.active {
background:linear-gradient(135deg,rgba(209,250,229,.95),rgba(204,251,241,.9),rgba(187,247,208,.9));
border-color:rgba(5,150,105,.35);
box-shadow:0 4px 16px rgba(5,150,105,.15);
}
body.mint .tab-btn.active .tab-label { color:#047857; }
body.mint .topbar-logo,
body.mint .combi-header,
body.mint .value-banner-title,
body.mint .modal-box h3,
body.mint .wallet-big .amount,
body.mint .made-by {
background:linear-gradient(135deg,#059669 0%,#0891b2 60%,#0284c7 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
body.mint .comp-chip.active {
background:linear-gradient(135deg,rgba(209,250,229,.8),rgba(204,251,241,.65));
border-color:rgba(5,150,105,.4);
}
body.mint .comp-chip.active .cname { color:#047857; }
body.mint .w-item.bal .val { color:#047857; }
body.mint .match-card.selected {
background:linear-gradient(135deg,rgba(209,250,229,.7),rgba(204,251,241,.6));
border-color:rgba(5,150,105,.4);
}

/* ── CRÈME THEMA (warm beige, zachte ogen) ── */
body.cream {
--bg1:#fdf6e3;--bg2:#faf3dd;--bg3:#fef9e7;
--ink:#3d2817;--muted:#6b5d4f;--sub:#8a7a6a;
--card:rgba(255,252,240,0.88);--card2:rgba(253,247,220,0.72);
--stroke:rgba(61,40,23,0.10);
--accent:#b45309;
--rose:#fef3c7;--lavender:#fed7aa;--sky:#fde68a;
}
body.cream {
background:
radial-gradient(1200px 700px at 20% -10%,rgba(251,191,36,.15),transparent 55%),
radial-gradient(1000px 650px at 85% 5%,rgba(253,230,138,.22),transparent 60%),
radial-gradient(900px 700px at 40% 120%,rgba(254,215,170,.18),transparent 60%),
linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg3));
}
body.cream .tab-nav-wrap {
background:linear-gradient(180deg,rgba(253,246,227,.98) 80%,transparent);
}
body.cream .tab-btn.active {
background:linear-gradient(135deg,rgba(254,243,199,.95),rgba(253,230,138,.9),rgba(254,215,170,.9));
border-color:rgba(180,83,9,.35);
box-shadow:0 4px 16px rgba(180,83,9,.15);
}
body.cream .tab-btn.active .tab-label { color:#92400e; }
body.cream .topbar-logo,
body.cream .combi-header,
body.cream .value-banner-title,
body.cream .modal-box h3,
body.cream .wallet-big .amount,
body.cream .made-by {
background:linear-gradient(135deg,#b45309 0%,#c2410c 60%,#dc2626 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
body.cream .comp-chip.active {
background:linear-gradient(135deg,rgba(254,243,199,.8),rgba(253,230,138,.65));
border-color:rgba(180,83,9,.4);
}
body.cream .comp-chip.active .cname { color:#92400e; }
body.cream .w-item.bal .val { color:#92400e; }
body.cream .match-card.selected {
background:linear-gradient(135deg,rgba(254,243,199,.7),rgba(253,230,138,.6));
border-color:rgba(180,83,9,.4);
}
body.dark .match-card,
body.dark .result-card,
body.dark .settings-section,
body.dark .combi-bet-row,
body.dark .bet-row,
body.dark .tracker-row,
body.dark .wallet-strip,
body.dark .tab-nav-wrap { background:var(--card); }
body.dark .match-card { border-color:var(--stroke); }
body.dark .card-head { background:rgba(255,255,255,.04); }
body.dark .modal-box { background:linear-gradient(180deg,#1a1d28,#151826); }
body.dark .modal-input { background:rgba(255,255,255,.06);color:var(--ink);border-color:var(--stroke); }
body.dark .odds-btn { background:rgba(255,255,255,.06);border-color:var(--stroke); }
body.dark .comp-chip { background:rgba(255,255,255,.06);border-color:var(--stroke); }
body.dark .comp-chip.active { background:rgba(219,39,119,.15); }
body.dark .tab-btn { background:rgba(255,255,255,.05);border-color:var(--stroke); }
body.dark .tab-btn.active { background:linear-gradient(135deg,rgba(219,39,119,.2),rgba(37,99,235,.15)); }
body.dark .tab-nav { background:transparent; }
body.dark input,body.dark select { background:rgba(255,255,255,.06);color:var(--ink); }
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
background:
radial-gradient(1200px 700px at 20% -10%,rgba(255,168,217,.22),transparent 55%),
radial-gradient(1000px 650px at 85% 5%,rgba(143,209,255,.22),transparent 60%),
radial-gradient(900px 700px at 40% 120%,rgba(191,164,255,.20),transparent 60%),
linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg3));
color:var(--ink);
font-family:‘DM Sans’,sans-serif;
font-size:16px;
line-height:1.6;
min-height:100vh;overflow-x:hidden;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
}
.app{position:relative;z-index:1;max-width:860px;margin:0 auto;
padding:1.2rem 1rem 6rem;
padding-top:max(1.2rem,env(safe-area-inset-top));
padding-bottom:max(6rem,env(safe-area-inset-bottom));
}

/* ── INSTALL BANNER ── */
#installBanner{display:none;background:rgba(255,154,193,.12);border:1px solid rgba(255,154,193,.35);
border-radius:14px;padding:.7rem 1rem;margin-bottom:1rem;align-items:center;gap:.8rem;
backdrop-filter:blur(10px);}
#installBanner.show{display:flex;}
#installBanner p{font-family:‘IBM Plex Mono’,monospace;font-size:.65rem;color:var(--ink);flex:1;line-height:1.4;}
#installBanner p span{color:#d63384;}
.install-btn{background:linear-gradient(135deg,rgba(255,154,193,.8),rgba(107,182,255,.8));
color:#fff;border:none;border-radius:999px;
font-family:‘IBM Plex Mono’,monospace;font-size:.62rem;font-weight:700;
padding:6px 14px;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow2);}
.dismiss-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:1.4rem;
padding-bottom:1rem;border-bottom:1px solid var(--stroke);}
.topbar-logo{font-family:‘Bebas Neue’,sans-serif;font-size:2.2rem;letter-spacing:.08em;line-height:1;
background:linear-gradient(135deg,#ff9ac1 0%,#a78bfa 60%,#6bb6ff 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.made-by{font-family:‘Dancing Script’,cursive;font-size:.95rem;
background:linear-gradient(135deg,#ff9ac1,#a78bfa);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;margin-top:1px;}
.topbar-sub{font-family:‘IBM Plex Mono’,monospace;font-size:.56rem;color:var(--muted);
letter-spacing:.1em;line-height:1.7;margin-top:2px;}
.topbar-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;}
.live-badge{font-family:‘IBM Plex Mono’,monospace;font-size:.55rem;color:var(--green);
border:1px solid rgba(46,204,113,.3);padding:4px 9px;border-radius:999px;
background:rgba(46,204,113,.08);display:flex;align-items:center;gap:.3rem;
box-shadow:var(--shadow2);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink .9s infinite;}
.version-badge{font-family:‘IBM Plex Mono’,monospace;font-size:.5rem;color:var(--muted);
border:1px solid var(--stroke);padding:3px 9px;border-radius:999px;
background:var(--card);box-shadow:var(--shadow2);}

/* ── WALLET STRIP ── */
.wallet-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;
background:rgba(255,255,255,.82);border:1px solid var(--stroke);
border-radius:16px;padding:.8rem .9rem;margin-bottom:1.2rem;
box-shadow:var(--shadow2);}
.w-item .lbl{font-family:‘IBM Plex Mono’,monospace;font-size:.58rem;color:var(--sub);
letter-spacing:.05em;text-transform:uppercase;margin-bottom:.2rem;font-weight:600;}
.w-item .val{font-family:‘Bebas Neue’,sans-serif;font-size:1.3rem;letter-spacing:.03em;}
.w-item.bal .val{color:#be185d;}
.w-item.pnl .val{color:var(--green);}
.w-item.bets .val{color:#2563eb;}
.w-item.rate .val{color:#7c3aed;}

/* ── TAB NAV ── */
.tab-nav-wrap{
position:sticky;top:0;z-index:100;
margin:0 -1rem 1.2rem;
padding:0 1rem;
background:linear-gradient(180deg,rgba(254,246,240,.98) 80%,transparent);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
}
.tab-nav{
display:flex;gap:.4rem;
overflow-x:auto;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
padding:.5rem 0;
scrollbar-width:none;
}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{
flex-shrink:0;
scroll-snap-align:start;
display:flex;flex-direction:column;align-items:center;gap:.25rem;
background:rgba(255,255,255,.85);
border:1.5px solid var(--stroke);
color:var(--sub);
min-width:75px;
max-width:90px;
padding:.6rem .6rem;
border-radius:14px;
cursor:pointer;
transition:all .2s;
box-shadow:0 2px 8px rgba(15,23,42,.06);
}
.tab-btn:hover{border-color:rgba(219,39,119,.3);background:rgba(255,255,255,.95);}
.tab-icon{font-size:1.3rem;line-height:1;}
.tab-label{font-family:‘IBM Plex Mono’,monospace;font-size:.52rem;font-weight:700;
letter-spacing:.02em;white-space:nowrap;text-align:center;}
.tab-btn.active{
background:linear-gradient(135deg,rgba(252,231,243,.95),rgba(224,242,254,.9),rgba(237,233,254,.9));
border-color:rgba(219,39,119,.35);
color:var(--ink);
box-shadow:0 4px 16px rgba(219,39,119,.15);
}
.tab-btn.active .tab-label{color:#be185d;}

/* ── TABS ── */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── SECTION LABEL ── */
.section-label{font-family:‘IBM Plex Mono’,monospace;font-size:.62rem;color:var(--sub);
letter-spacing:.12em;text-transform:uppercase;margin:1rem 0 .55rem;font-weight:600;
display:flex;align-items:center;gap:.5rem;}
.section-label::after{content:’’;flex:1;height:1px;background:var(--stroke);}

/* ── COMPETITIE CHIPS ── */
.comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin-bottom:1rem;}
.comp-chip{background:rgba(255,255,255,.78);border:1px solid var(--stroke);border-radius:14px;
padding:.55rem .4rem;text-align:center;cursor:pointer;transition:all .2s;
box-shadow:0 2px 8px rgba(15,23,42,.06);position:relative;}
.comp-chip .flag{font-size:1.2rem;display:block;margin-bottom:.3rem;}
.comp-chip .cname{font-family:‘IBM Plex Mono’,monospace;font-size:.6rem;color:var(--muted);
letter-spacing:.02em;line-height:1.3;font-weight:600;}
.comp-chip.active{border-color:rgba(219,39,119,.4);
background:linear-gradient(135deg,rgba(252,231,243,.8),rgba(224,242,254,.65));}
.comp-chip.active .cname{color:#be185d;}
/* Multi-selectie: aangevinkt met groen vinkje */
.comp-chip.fav{border-color:rgba(22,163,74,.45);
background:linear-gradient(135deg,rgba(22,163,74,.12),rgba(22,163,74,.05));}
.comp-chip.fav .cname{color:#15803d;}
.comp-chip.fav::after{content:‘✓’;position:absolute;top:3px;right:5px;
font-size:.6rem;color:#15803d;font-weight:800;}

/* ── WEDSTRIJD KAARTEN ── */
.match-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem;}
.match-card{background:rgba(255,255,255,.82);border:1px solid var(--stroke);border-radius:16px;
overflow:hidden;transition:all .2s;cursor:pointer;
box-shadow:var(--shadow2);backdrop-filter:blur(12px);
position:relative;} /* VALUE: voor positionering badge */
.match-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.match-card.selected{border-color:rgba(219,39,119,.4);
background:linear-gradient(135deg,rgba(252,231,243,.7),rgba(224,242,254,.6));}
.match-card.value-glow{box-shadow:0 0 0 2px rgba(22,163,74,.3),0 4px 16px rgba(22,163,74,.2);}
.match-top{display:flex;align-items:center;padding:.45rem .9rem;
border-bottom:1px solid var(--stroke);background:rgba(255,255,255,.3);}
.match-comp-name{font-family:‘IBM Plex Mono’,monospace;font-size:.6rem;color:var(--sub);
letter-spacing:.04em;flex:1;font-weight:600;}
.match-time{font-family:‘IBM Plex Mono’,monospace;font-size:.6rem;color:#7c3aed;font-weight:700;}
.match-status-pill{font-family:‘IBM Plex Mono’,monospace;font-size:.54rem;
padding:3px 9px;border-radius:999px;margin-left:.5rem;font-weight:700;}
.status-soon{background:rgba(124,58,237,.1);color:#7c3aed;border:1px solid rgba(124,58,237,.25);}
.status-live{background:rgba(220,38,38,.08);color:var(--red);border:1px solid rgba(220,38,38,.2);
animation:pulse 1.5s infinite;}
.status-done{background:rgba(71,85,105,.07);color:var(--sub);border:1px solid var(--stroke);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.match-teams{display:flex;align-items:center;justify-content:space-between;padding:.8rem .9rem;}
.team-block{flex:1;}
.team-away{text-align:right;}
.team-name{font-size:.95rem;font-weight:800;line-height:1.2;color:var(--ink);letter-spacing:-.01em;
overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;
word-break:break-word;}
.team-form{display:flex;gap:2px;margin-top:.35rem;}
.team-away .team-form{justify-content:flex-end;}
.form-dot{width:9px;height:9px;border-radius:3px;}
.form-dot.W{background:var(--green);}
.form-dot.D{background:var(--yellow);}
.form-dot.L{background:var(--red);}
.vs-col{padding:0 .8rem;text-align:center;flex-shrink:0;}
.vs-txt{font-family:‘IBM Plex Mono’,monospace;font-size:.6rem;color:var(--sub);font-weight:600;}
.score-txt{font-family:‘Bebas Neue’,sans-serif;font-size:1.4rem;color:var(--ink);}

/* AI kans balken */
.ai-probs{display:flex;align-items:center;gap:.4rem;padding:.5rem .9rem;
border-top:1px solid var(--stroke);}
.prob-seg{flex:1;}
.prob-bar-bg{height:5px;background:rgba(28,35,48,.07);border-radius:3px;overflow:hidden;margin-bottom:2px;}
.prob-bar-fill{height:100%;border-radius:3px;}
.prob-bar-fill.w{background:var(--green);}
.prob-bar-fill.d{background:var(--yellow);}
.prob-bar-fill.l{background:var(--red);}
.prob-pct{font-family:‘IBM Plex Mono’,monospace;font-size:.58rem;text-align:center;font-weight:700;}
.prob-pct.w{color:var(--green);}
.prob-pct.d{color:var(--yellow);}
.prob-pct.l{color:var(--red);}

/* Quote knoppen */
.match-odds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;
padding:.6rem .9rem;border-top:1px solid var(--stroke);}
.odds-btn{background:rgba(255,255,255,.85);border:1px solid var(--stroke);border-radius:10px;
padding:.55rem .3rem;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(15,23,42,.05);}
.odds-btn:hover{border-color:rgba(219,39,119,.35);box-shadow:var(--shadow2);}
.odds-btn.picked{background:linear-gradient(135deg,rgba(252,231,243,.85),rgba(224,242,254,.75));
border-color:rgba(219,39,119,.4);}
.odds-btn.value-pick{background:linear-gradient(135deg,rgba(22,163,74,.15),rgba(22,163,74,.05));
border-color:rgba(22,163,74,.45);position:relative;}
.odds-btn.value-pick::after{content:‘⚡’;position:absolute;top:-6px;right:-4px;
font-size:.85rem;filter:drop-shadow(0 0 4px rgba(22,163,74,.6));}
.odds-lbl{font-family:‘IBM Plex Mono’,monospace;font-size:.55rem;color:var(--sub);
letter-spacing:.04em;display:block;margin-bottom:.2rem;font-weight:700;}
.odds-val{font-family:‘Bebas Neue’,sans-serif;font-size:1.15rem;letter-spacing:.04em;color:var(--ink);}
.odds-btn.picked .odds-val{color:#be185d;}
.odds-btn.value-pick .odds-val{color:#15803d;}


/* ── KAART ANIMATIES + COMPACT ── */
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes valuePop{0%{transform:scale(.8);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
.match-list{gap:.4rem !important;}
.match-card{
  animation:cardIn .22s ease both;
  transition:transform .13s,box-shadow .13s,border-color .13s !important;
  will-change:transform;
}
.match-card:active{transform:scale(.983) !important;}
.match-card:nth-child(1){animation-delay:.02s;}
.match-card:nth-child(2){animation-delay:.05s;}
.match-card:nth-child(3){animation-delay:.08s;}
.match-card:nth-child(4){animation-delay:.11s;}
.match-card:nth-child(5){animation-delay:.14s;}
.match-card:nth-child(n+6){animation-delay:.17s;}
.match-top{padding:.32rem .75rem !important;}
.match-teams{padding:.5rem .75rem !important;}
.team-name{font-size:.86rem !important;}
.match-odds{padding:.4rem .75rem !important;gap:.3rem !important;}
.odds-btn{padding:.4rem .25rem !important;border-radius:9px !important;}
.odds-btn:active{transform:scale(.91) !important;}
.odds-val{font-size:1.08rem !important;}
.ai-probs{padding:.3rem .75rem !important;}
.prob-bar-bg{height:4px !important;}
.odds-btn.value-pick::after{animation:valuePop .35s ease both !important;}
@keyframes scanPulse{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.4);}50%{box-shadow:0 0 0 8px rgba(22,163,74,0);}}
.scanning{animation:scanPulse .8s infinite !important;}
.tab-content.active{animation:cardIn .18s ease;}

/* ═══ VALUE DETECTIE ═══ */
/* Value badge: naast de comp-naam boven in de card, niet overlappend met GEPLAND pill */
.match-card.has-value .match-top { padding-top: 1.8rem; }
.value-badge{
position:absolute;top:6px;left:10px;z-index:10;
font-family:‘IBM Plex Mono’,monospace;font-size:.54rem;font-weight:800;
padding:3px 10px;border-radius:999px;letter-spacing:.05em;
box-shadow:0 4px 12px rgba(0,0,0,.15);
white-space:nowrap;
}
.value-badge.high{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;
animation:valuePulse 2s ease-in-out infinite;
box-shadow:0 4px 14px rgba(22,163,74,.45);}
.value-badge.med{background:linear-gradient(135deg,#d97706,#b45309);color:#fff;}
.value-badge.low{background:rgba(100,116,139,.9);color:#fff;}
.value-badge.neg{background:rgba(220,38,38,.75);color:#fff;}

@keyframes valuePulse{
0%,100%{transform:scale(1);box-shadow:0 4px 14px rgba(22,163,74,.45);}
50%{transform:scale(1.08);box-shadow:0 6px 20px rgba(22,163,74,.7);}
}
