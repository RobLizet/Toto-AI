<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B1519" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TOTO AI" />
  <title>TOTO AI</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="base_v30.css" />
  <link rel="stylesheet" href="components.css" />
  <link rel="stylesheet" href="screens_v30.css" />

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="app" class="app">

  <div id="topbar" class="topbar" style="display:none">
    <div class="topbar-left">
      <span class="topbar-logo">TOTO <span class="topbar-ai">AI</span></span>
      <span id="topbar-version" class="topbar-version"></span>
      <span id="topbar-user" class="topbar-user" style="display:none"></span>
    </div>
    <div class="topbar-right">
      <button id="topbar-login-btn" class="topbar-icon-btn" onclick="handleLoginBtnClick()" title="Account" style="display:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span id="login-status-dot" style="position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:#dc2626;border:1.5px solid white;display:block"></span>
      </button>
      <button id="topbar-notif-btn" class="topbar-icon-btn" onclick="toggleNotifications();this.classList.add('bell-ring');setTimeout(()=>this.classList.remove('bell-ring'),600)" title="Notificaties">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span id="notif-dot" class="notif-dot" style="display:none"></span>
      </button>
      <button class="topbar-icon-btn" onclick="toggleMoreMenu()" title="Meer opties">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="more-menu-backdrop" class="more-menu-backdrop" onclick="closeMoreMenu()"></div>

  <div id="more-menu" class="more-menu">
    <div class="more-menu-panel">
      <button class="more-menu-item" onclick="switchScreen('instellingen');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Instellingen
      </button>
      <button class="more-menu-item" onclick="switchScreen('analytics');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        📊 Stats & Analytics
      </button>
      <button class="more-menu-item" onclick="switchScreen('wk2026');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="6"/>
          <path d="M12 14v7M8 21h8"/>
        </svg>
        🏆 WK 2026 Voorspelling
      </button>
      <button class="more-menu-item" onclick="saveToFirebase();closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        Opslaan naar Firebase
      </button>
      <button class="more-menu-item" onclick="window.open('help.html','_blank');closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Help & Uitleg
      </button>
      <button class="more-menu-item" onclick="logoutUser();closeMoreMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Uitloggen
      </button>
    </div>
  </div>

  <div id="firebase-status" class="firebase-status" style="display:none"></div>

  <div id="auto-check-bar" class="auto-check-bar" style="display:none">
    <span id="auto-check-msg" class="auto-check-msg"></span>
    <button onclick="document.getElementById('auto-check-bar').style.display='none'" class="auto-check-close">✕</button>
  </div>

  <div id="install-banner" class="install-banner" style="display:none">
    <span>Installeer TOTO AI als app</span>
    <button id="install-btn" class="install-btn">Installeren</button>
    <button onclick="document.getElementById('install-banner').style.display='none'" class="install-close">✕</button>
  </div>

  <div id="screen-login" class="screen screen-login">
    <div class="login-container">
      <div class="login-logo">
        <span class="login-logo-toto">TOTO</span>
        <span class="login-logo-ai">AI</span>
      </div>
      <p class="login-tagline">Slimme voetbalanalyse</p>

      <div class="login-tabs">
        <button id="login-tab-in" class="login-tab active" onclick="switchLoginTab('in')">Inloggen</button>
        <button id="login-tab-reg" class="login-tab" onclick="switchLoginTab('reg')">Registreren</button>
      </div>

      <div id="login-form-in" class="login-form">
        <input id="login-email" type="email" class="login-input" placeholder="E-mailadres" autocomplete="email" />
        <input id="login-password" type="password" class="login-input" placeholder="Wachtwoord" autocomplete="current-password" />
        <button class="login-submit-btn" onclick="loginWithEmail()">Inloggen</button>
        <button class="login-google-btn" onclick="loginWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Doorgaan met Google
        </button>
      </div>

      <div id="login-form-reg" class="login-form" style="display:none">
        <input id="reg-email" type="email" class="login-input" placeholder="E-mailadres" autocomplete="email" />
        <input id="reg-password" type="password" class="login-input" placeholder="Wachtwoord (min. 6 tekens)" autocomplete="new-password" />
        <input id="reg-password2" type="password" class="login-input" placeholder="Herhaal wachtwoord" autocomplete="new-password" />
        <button class="login-submit-btn" onclick="registerWithEmail()">Account aanmaken</button>
      </div>

      <button class="login-skip-btn" onclick="skipLoginAndEnter()">Verder zonder account</button>
    </div>
  </div>

  <div id="screen-dashboard" class="screen screen-dashboard">
    </div>

  <div id="screen-wedstrijden" class="screen screen-wedstrijden">
    </div>

  <div id="screen-analyse" class="screen screen-analyse">
    </div>

  <div id="screen-wallet" class="screen screen-wallet">
    </div>

  <div id="screen-instellingen" class="screen screen-instellingen">
    </div>

  <div id="screen-analytics" class="screen screen-analytics">
    </div>

  <div id="screen-wk2026" class="screen screen-wk2026">
    </div>

  <nav id="bottom-nav" class="bottom-nav" style="display:none">
    <button class="bnav-btn" data-screen="dashboard" onclick="switchScreen('dashboard')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span>Home</span>
      <span class="bnav-dot" id="dot-dashboard"></span>
    </button>
    <button class="bnav-btn" data-screen="wedstrijden" onclick="switchScreen('wedstrijden')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
      <span>Matches</span>
      <span class="bnav-dot" id="dot-wedstrijden"></span>
    </button>
    <button class="bnav-btn" data-screen="analyse" onclick="switchScreen('analyse')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Analyse</span>
      <span class="bnav-dot" id="dot-analyse"></span>
    </button>
    <button class="bnav-btn" data-screen="wallet" onclick="switchScreen('wallet')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      <span>Wallet</span>
      <span class="bnav-dot" id="dot-wallet"></span>
    </button>
  </nav>

</div>

<div id="bet-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeBetModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="bet-modal-title" class="modal-title">Weddenschap toevoegen</h3>
      <button class="modal-close-btn" onclick="closeBetModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Wedstrijd</label>
        <select id="modal-match-select" class="modal-select" onchange="syncModalOdds()"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pick</label>
          <input id="modal-pick" type="text" class="modal-input" placeholder="bijv. 1, X, BTS" />
        </div>
        <div class="form-group">
          <label class="form-label">Odd</label>
          <input id="modal-odds" type="number" step="0.01" class="modal-input" placeholder="1.85" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Inzet (€)</label>
          <input id="modal-stake" type="number" step="0.5" class="modal-input" value="10" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="modal-status" class="modal-select">
            <option value="open">Open</option>
            <option value="won">Gewonnen</option>
            <option value="lost">Verloren</option>
          </select>
        </div>
      </div>
      <button class="modal-btn-primary" onclick="saveBetFromModal()">Opslaan</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="state.js"></script>
<script src="firebase-db.js"></script>
<script src="api.js"></script>
<script src="router_v30.js"></script>
<script src="ui_dashboard.js"></script>
<script src="ui_matches.js"></script>
<script src="ui_analyse.js"></script>
<script src="ui_wallet.js"></script>
<script src="ui_settings.js"></script>
<script src="ui_analytics.js"></script>
<script src="ui_wk2026.js"></script>
<script src="main.js"></script>

</body>
</html>
