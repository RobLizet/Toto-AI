  <script>
  // v26.241: globale error-boundary — voorkomt dat één ongevangen JS-fout de hele UI sloopt.
  (function(){
    var shown = 0;
    function report(kind, msg, src, line, col){
      try {
        console.error('[PMX ' + kind + ']', msg, src ? ('@' + src + ':' + line + ':' + col) : '');
        if (shown) return; shown = 1;
        var b = document.getElementById('pmx-error-bar');
        if (!b) {
          b = document.createElement('div');
          b.id = 'pmx-error-bar';
          b.style.cssText = 'position:fixed;left:8px;right:8px;bottom:76px;z-index:99999;background:rgba(30,10,10,.96);border:1px solid rgba(220,38,38,.4);border-radius:12px;padding:.6rem .8rem;font-family:monospace;font-size:.62rem;color:#fca5a5;box-shadow:0 6px 24px rgba(0,0,0,.5);display:flex;gap:.6rem;align-items:center;justify-content:space-between;';
          (document.body || document.documentElement).appendChild(b);
        }
        b.innerHTML = '<span>\u26a0\ufe0f Er ging iets mis, maar de app blijft werken.</span>';
        var btn = document.createElement('button');
        btn.textContent = 'sluit';
        btn.style.cssText = 'background:none;border:1px solid rgba(220,38,38,.4);color:#fca5a5;border-radius:8px;padding:.2rem .5rem;font-family:monospace;font-size:.6rem;cursor:pointer;flex-shrink:0;';
        btn.onclick = function(){ b.remove(); shown = 0; };
        b.appendChild(btn);
        setTimeout(function(){ if (b && b.parentNode) { b.remove(); shown = 0; } }, 6000);
      } catch(e) {}
    }
    window.addEventListener('error', function(e){ report('error', (e && e.message) || String(e && e.error || ''), e && e.filename, e && e.lineno, e && e.colno); });
    window.addEventListener('unhandledrejection', function(e){ var r = e && e.reason; report('promise', (r && r.message) || String(r)); });
  })();
  </script>

<script>
(function initApp() {
  'use strict';

  // ── Laad opgeslagen state ──
  loadState();
  applyStoredTheme();

  // ── Versienummer in topbar ──
  const vEl = document.getElementById('topbar-version');
  if (vEl) vEl.textContent = APP_VERSION;

  // ── Service Worker registreren ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // ── PWA Install banner ──
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
    document.getElementById('install-btn').addEventListener('click', () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    });
  });

  // ── OneSignal init ──
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: '7efd1d2e-630e-48b3-bc32-2704e1a5dc2f',
      serviceWorkerPath: '/OneSignalSDKWorker.js',
      notifyButton: { enable: false },
    });
  });

  // ── Firebase Auth init (bepaalt welk scherm getoond wordt) ──
  initFirebaseAuth();

  // ── Bottom nav init ──
  initBottomNav();

  // ── Auto dark mode check ──
  if (typeof checkAutoDarkNow === 'function') checkAutoDarkNow();

  // ── Start Firebase auto-sync (elke 5 min) ──
  if (typeof scheduleFirebaseSync === 'function') scheduleFirebaseSync();

  // ── Keyboard shortcut: Escape sluit modals ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      ['bet-modal','quick-bet-modal','tracker-modal','deposit-modal',
       'withdraw-modal','comp-detail-modal','analyse-modal'].forEach(id => {
        const el = document.getElementById(id);
        if (el && el.style.display !== 'none') el.style.display = 'none';
      });
      closeMoreMenu();
    }
  });

})();
</script>

    style="position:fixed;bottom:7rem;right:1rem;z-index:9999;

      style="height:220px;overflow-y:auto;padding:.6rem .8rem;display:flex;flex-direction:column;gap:.4rem;">
      <div style="font-family:monospace;font-size:.48rem;color:#64748b;text-align:center;padding:.5rem;">
        Stel vragen over wedstrijden & picks 💬
      </div>
    </div>
    <div style="display:flex;gap:.4rem;padding:.5rem .7rem;border-top:1px solid rgba(15,23,42,.08);">
      <input id="fab-chat-input" type="text" placeholder="Stel een vraag..."
        style="flex:1;font-family:monospace;font-size:.54rem;
        border:1px solid rgba(15,23,42,.12);border-radius:10px;padding:.4rem .7rem;
        background:rgba(15,23,42,.03);outline:none;"
        onkeydown="if(event.key==='Enter')sendFloatingChat()">
      <button onclick="sendFloatingChat()"
        style="background:linear-gradient(135deg,#7c3aed,#be185d);border:none;
        border-radius:10px;padding:.4rem .75rem;color:#fff;
        font-family:monospace;font-size:.6rem;font-weight:700;cursor:pointer;">▶</button>
    </div>
  </div>

  <script>
  var _fabHistory = [];

  function toggleFloatingChat() {
    var panel = document.getElementById('fab-chat-panel');
    if (!panel) return;
    var isOpen = panel.style.display === 'flex';
    panel.style.display = isOpen ? 'none' : 'flex';
    if (!isOpen) {
      setTimeout(function() {
        var inp = document.getElementById('fab-chat-input');
        if (inp) inp.focus();
      }, 100);
    }
  }

  function clearFloatingChat() {
    _fabHistory = [];
    var msgs = document.getElementById('fab-chat-messages');
    if (msgs) msgs.innerHTML = '<div style="font-family:monospace;font-size:.48rem;color:#64748b;text-align:center;padding:.5rem;">Chat gewist. Stel gerust een nieuwe vraag! 👋</div>';
  }

  async function sendFloatingChat() {
    var inp = document.getElementById('fab-chat-input');
    var msgs = document.getElementById('fab-chat-messages');
    if (!inp || !msgs) return;
    var text = inp.value.trim();
    if (!text) return;
    inp.value = '';

    // Gebruiker bubble
    var userBubble = document.createElement('div');
    userBubble.style.cssText = 'align-self:flex-end;background:linear-gradient(135deg,#7c3aed,#be185d);color:#fff;padding:.4rem .7rem;border-radius:12px 12px 2px 12px;font-family:monospace;font-size:.5rem;max-width:85%;line-height:1.5;';
    userBubble.textContent = text;
    msgs.appendChild(userBubble);

    _fabHistory.push({ role: 'user', content: text });
    if (_fabHistory.length > 20) _fabHistory = _fabHistory.slice(-20);

    // Loading bubble
    var loadingBubble = document.createElement('div');
    loadingBubble.style.cssText = 'align-self:flex-start;background:rgba(15,23,42,.06);padding:.4rem .7rem;border-radius:12px 12px 12px 2px;font-family:monospace;font-size:.5rem;max-width:85%;line-height:1.5;color:#64748b;';
    loadingBubble.textContent = '⟳ Denkt na...';
    msgs.appendChild(loadingBubble);
    msgs.scrollTop = msgs.scrollHeight;

    try {
      var WORKER_URL = 'https://api.promatchxi.app';
      var authToken = '';
      try {
        var u = typeof firebase !== 'undefined' && firebase.auth().currentUser;
        if (u) authToken = await u.getIdToken();
      } catch(e) {}

      var systemParts = ['Je bent ProMatchXI assistent. Help de gebruiker met voetbal betting analyse, picks en statistieken. Antwoord in het Nederlands, beknopt en to the point.'];
      if (typeof state !== 'undefined') {
        if (state.selectedMatch) systemParts.push('Geselecteerde wedstrijd: ' + (state.selectedMatch.home||'') + ' vs ' + (state.selectedMatch.away||''));
        if (state.valueScans && state.valueScans.length) systemParts.push('Laatste scan: ' + state.valueScans.length + ' picks');
      }

      var res = await fetch(WORKER_URL + '/anthropic', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(authToken ? {'Authorization': 'Bearer ' + authToken} : {})
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 400,
          system: systemParts.join('\n\n'),
          messages: _fabHistory
        })
      });
      var data = await res.json();
      var answer = data && data.content && data.content[0] ? data.content[0].text : '⚠ Geen antwoord ontvangen';
      loadingBubble.textContent = answer;
      loadingBubble.style.color = '#0f172a';
      _fabHistory.push({ role: 'assistant', content: answer });
    } catch(e) {
      loadingBubble.textContent = '⚠ Fout: ' + e.message;
      loadingBubble.style.color = '#dc2626';
    }
    msgs.scrollTop = msgs.scrollHeight;
  }
  </script>
