<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>ProMatchXI — Inloggen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0f;
  --bg2:     #12121a;
  --card:    #1a1a26;
  --border:  rgba(255,255,255,.07);
  --text:    #f0f0f8;
  --muted:   rgba(240,240,248,.45);
  --accent:  #db2777;
  --accent2: #7c3aed;
  --green:   #16a34a;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'DM Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── Animated background ── */
.bg-mesh {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(219,39,119,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 80%, rgba(124,58,237,.1) 0%, transparent 60%),
    radial-gradient(ellipse 100% 100% at 50% 50%, rgba(10,10,15,1) 40%, transparent 100%);
  animation: meshShift 8s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(15deg); }
}

/* Grid overlay */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; opacity: .03;
  background-image:
    linear-gradient(rgba(255,255,255,.8) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.8) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── Layout ── */
.container {
  position: relative; z-index: 1;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem;
  max-width: 420px; margin: 0 auto;
}

/* ── Logo ── */
.logo-wrap {
  text-align: center; margin-bottom: 2.5rem;
  animation: fadeDown .6s ease both;
}
.logo {
  font-family: var(--display);
  font-size: 3.5rem; letter-spacing: .08em; line-height: 1;
  background: linear-gradient(135deg, #fff 30%, rgba(219,39,119,.8));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-ai {
  background: linear-gradient(135deg, #db2777, #7c3aed);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.tagline {
  font-family: var(--mono); font-size: .6rem; font-weight: 500;
  color: var(--muted); letter-spacing: .15em; text-transform: uppercase;
  margin-top: .5rem;
}

/* ── Card ── */
.card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2rem 1.75rem;
  box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(219,39,119,.06);
  animation: fadeUp .6s .15s ease both;
}

/* ── Tabs ── */
.tabs {
  display: flex; gap: .25rem;
  background: rgba(255,255,255,.04);
  border-radius: 12px; padding: .3rem;
  margin-bottom: 1.75rem;
}
.tab {
  flex: 1; padding: .5rem;
  font-family: var(--mono); font-size: .6rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  border: none; background: transparent;
  color: var(--muted); border-radius: 9px;
  cursor: pointer; transition: all .2s;
}
.tab.active {
  background: rgba(219,39,119,.15);
  color: #db2777;
  box-shadow: 0 0 0 1px rgba(219,39,119,.3);
}

/* ── Forms ── */
.form { display: flex; flex-direction: column; gap: .75rem; }
.form-hidden { display: none; }

.input-wrap { position: relative; }
.input-label {
  font-family: var(--mono); font-size: .48rem; font-weight: 700;
  letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
  display: block; margin-bottom: .4rem;
}
.input {
  width: 100%;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .75rem 1rem;
  font-family: var(--sans); font-size: .9rem;
  color: var(--text);
  transition: all .2s; outline: none;
}
.input::placeholder { color: rgba(240,240,248,.25); }
.input:focus {
  border-color: rgba(219,39,119,.4);
  background: rgba(219,39,119,.05);
  box-shadow: 0 0 0 3px rgba(219,39,119,.1);
}

/* ── Buttons ── */
.btn-primary {
  width: 100%; padding: .85rem;
  background: linear-gradient(135deg, #db2777, #9333ea);
  border: none; border-radius: 12px;
  font-family: var(--mono); font-size: .65rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: #fff; cursor: pointer;
  transition: all .2s; margin-top: .25rem;
  box-shadow: 0 4px 24px rgba(219,39,119,.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(219,39,119,.4); }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.btn-google {
  width: 100%; padding: .75rem;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: var(--sans); font-size: .85rem; font-weight: 500;
  color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: .6rem;
  transition: all .2s;
}
.btn-google:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.15); }
.btn-google:active { transform: scale(.98); }

.divider {
  display: flex; align-items: center; gap: .75rem;
  margin: .25rem 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.divider span {
  font-family: var(--mono); font-size: .5rem; color: var(--muted);
  letter-spacing: .1em; text-transform: uppercase;
}

.btn-skip {
  width: 100%; padding: .6rem;
  background: transparent; border: none;
  font-family: var(--mono); font-size: .52rem;
  color: var(--muted); cursor: pointer;
  letter-spacing: .06em;
  transition: color .2s; margin-top: .5rem;
}
.btn-skip:hover { color: var(--text); }

/* ── Error toast ── */
.error-msg {
  background: rgba(220,38,38,.1);
  border: 1px solid rgba(220,38,38,.25);
  border-radius: 8px; padding: .5rem .75rem;
  font-family: var(--mono); font-size: .52rem;
  color: #f87171; display: none;
}
.error-msg.show { display: block; }

/* ── Footer ── */
.footer {
  margin-top: 1.5rem; text-align: center;
  font-family: var(--mono); font-size: .45rem;
  color: rgba(240,240,248,.2); letter-spacing: .06em;
  line-height: 1.8;
  animation: fadeUp .6s .3s ease both;
}

/* ── Animations ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.loading-overlay.show { opacity: 1; pointer-events: all; }
.spinner {
  width: 36px; height: 36px;
  border: 2px solid rgba(219,39,119,.2);
  border-top-color: #db2777;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: var(--mono); font-size: .55rem;
  color: var(--muted); letter-spacing: .1em;
}
</style>
<script src="i18n.js?v=1782782998"></script>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText" data-i18n="login.loggingin">INLOGGEN...</div>
</div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo">ProMatch <span class="logo-ai">XI</span></div>
    <div class="tagline" data-i18n="login.tagline">Slimme voetbalanalyse · v15.0</div>
  </div>

  <div class="card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-in" onclick="switchTab('in')" data-i18n="login.signin">Inloggen</button>
      <button class="tab" id="tab-reg" onclick="switchTab('reg')" data-i18n="login.register">Registreren</button>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Inloggen form -->
    <div class="form" id="form-in">
      <div>
        <label class="input-label" data-i18n="login.email">E-mailadres</label>
        <input class="input" id="in-email" type="email" placeholder="jouw@email.nl" data-i18n-ph="login.emailph" autocomplete="email">
      </div>
      <div>
        <label class="input-label" data-i18n="login.password">Wachtwoord</label>
        <input class="input" id="in-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()" data-i18n="login.signin">Inloggen</button>

      <div class="divider"><span>of</span></div>

      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span data-i18n="login.googlecontinue">Doorgaan met Google</span>
      </button>
    </div>

    <!-- Registreren form -->
    <div class="form form-hidden" id="form-reg">
      <div>
        <label class="input-label" data-i18n="login.email">E-mailadres</label>
        <input class="input" id="reg-email" type="email" placeholder="jouw@email.nl" data-i18n-ph="login.emailph" autocomplete="email">
      </div>
      <div>
        <label class="input-label" data-i18n="login.password">Wachtwoord</label>
        <input class="input" id="reg-pass" type="password" placeholder="Min. 6 tekens" data-i18n-ph="login.pwminph" autocomplete="new-password">
      </div>
      <div>
        <label class="input-label" data-i18n="login.passwordrepeat">Wachtwoord herhalen</label>
        <input class="input" id="reg-pass2" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="btn-reg" onclick="doRegister()" data-i18n="login.createaccount">Account aanmaken</button>

      <div class="divider"><span>of</span></div>

      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span data-i18n="login.googleregister">Registreren met Google</span>
      </button>
    </div>

    <button class="btn-skip" onclick="doSkip()" data-i18n="login.continueanon">Verder zonder account →</button>
  </div>

  <div class="footer">
    ProMatchXI · AppsMadeByRobB · promatchxi.app<br>
    Uitsluitend voor entertainment &amp; educatie · 18+ · Verslavingslijn: 0900-1090
  </div>
</div>

<script>
// ── Firebase init ──
const firebaseConfig = {
  apiKey:           'AIzaSyB7K4SXPdxHSPIvFyXOfY2bpehcNnjRM-M',
  authDomain:       'toto-ai-397cb.firebaseapp.com',
  projectId:        'toto-ai-397cb',
  messagingSenderId:'426083019907',
  appId:            '1:426083019907:web:8f32f8037628d63cbbbfb6',
  databaseURL:      'https://toto-ai-397cb-default-rtdb.europe-west1.firebasedatabase.app'
};

let auth;
try {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();

  // Check redirect result
  auth.getRedirectResult().then(result => {
    if (result && result.user) goToApp();
  }).catch(e => {
    if (e.code !== 'auth/no-current-user') showError(e.message);
  });

  // Al ingelogd? Direct door (anonieme sessie telt NIET als ingelogd)
  auth.onAuthStateChanged(user => {
    if (user && !user.isAnonymous) goToApp();
  });
} catch(e) {
  console.error(t('login.fbinitfailed','Firebase init mislukt:'), e);
}

// ── Helpers ──
function showLoading(txt) {
  document.getElementById('loadingText').textContent = txt || t('login.loading2','LADEN...');
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}
function goToApp() {
  showLoading(t('login.apploading','APP LADEN...'));
  window.location.href = 'index.html';
}

// ── Tab switch ──
function switchTab(tab) {
  document.getElementById('tab-in').classList.toggle('active', tab === 'in');
  document.getElementById('tab-reg').classList.toggle('active', tab === 'reg');
  document.getElementById('form-in').classList.toggle('form-hidden', tab !== 'in');
  document.getElementById('form-reg').classList.toggle('form-hidden', tab !== 'reg');
  document.getElementById('errorMsg').classList.remove('show');
}

// ── Login ──
async function doLogin() {
  const email = document.getElementById('in-email').value.trim();
  const pass  = document.getElementById('in-pass').value;
  if (!email || !pass) { showError(t('login.fillcred','Vul e-mail en wachtwoord in')); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = t('login.loggingin','INLOGGEN...');
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    goToApp();
  } catch(e) {
    const msgs = {
      'auth/user-not-found':    t('login.noaccount','Geen account gevonden'),
      'auth/wrong-password':    t('login.wrongpw','Verkeerd wachtwoord'),
      'auth/invalid-credential':t('login.credwrong','E-mail of wachtwoord onjuist'),
      'auth/invalid-email':     t('login.invalidemail','Ongeldig e-mailadres'),
      'auth/too-many-requests': t('login.toomany','Te veel pogingen, probeer later')
    };
    showError(msgs[e.code] || e.message);
    btn.disabled = false; btn.textContent = t('login.signincaps','INLOGGEN');
  }
}

// ── Register ──
async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  if (!email || !pass) { showError(t('login.fillall','Vul alle velden in')); return; }
  if (pass.length < 6) { showError(t('auth.pwmin','Wachtwoord min. 6 tekens')); return; }
  if (pass !== pass2)  { showError(t('auth.pwmismatch','Wachtwoorden komen niet overeen')); return; }
  const btn = document.getElementById('btn-reg');
  btn.disabled = true; btn.textContent = t('login.creatingaccount','ACCOUNT AANMAKEN...');
  try {
    await auth.createUserWithEmailAndPassword(email, pass);
    goToApp();
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': t('login.emailinuse','E-mail al in gebruik'),
      'auth/invalid-email':        t('login.invalidemail','Ongeldig e-mailadres'),
      'auth/weak-password':        t('login.pwweak','Wachtwoord te zwak')
    };
    showError(msgs[e.code] || e.message);
    btn.disabled = false; btn.textContent = t('login.createaccountcaps','ACCOUNT AANMAKEN');
  }
}

// ── Google ──
async function doGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    // Probeer popup eerst (werkt beter in PWA/Android)
    try {
      showLoading('GOOGLE...');
      const result = await auth.signInWithPopup(provider);
      if (result && result.user) goToApp();
    } catch(popupErr) {
      // Popup geblokkeerd → redirect
      if (
        popupErr.code === 'auth/popup-blocked' ||
        popupErr.code === 'auth/popup-closed-by-user' ||
        popupErr.code === 'auth/cancelled-popup-request'
      ) {
        showLoading('DOORSTUREN NAAR GOOGLE...');
        await auth.signInWithRedirect(provider);
      } else {
        throw popupErr;
      }
    }
  } catch(e) {
    hideLoading();
    const msgs = {
      'auth/network-request-failed': t('login.noconnection','Geen internetverbinding'),
      'auth/user-disabled':          t('login.accountblocked','Account geblokkeerd'),
      'auth/operation-not-allowed':  'Google login niet ingeschakeld'
    };
    showError(msgs[e.code] || t('login.googlefailed','Google login mislukt: ') + e.message);
    console.error('[Google login]', e.code, e.message);
  }
}

// ── Skip ──
function doSkip() {
  localStorage.setItem('totoai_skip_login', '1');
  goToApp();
}

// Enter key submit
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const tab = document.getElementById('tab-in').classList.contains('active');
  if (tab) doLogin(); else doRegister();
});
</script>
</body>
</html>
